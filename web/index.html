<!DOCTYPE html>
<html lang="it" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wormhole</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <!-- Zen will be loaded via main.js import -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles/wormhole.css" />
  <style>
    /* Wormhole custom styles using DaisyUI dark theme */
    .file-drop-zone {
      border: 2px dashed hsl(var(--bc) / 0.3);
      border-radius: 0.5rem;
      padding: 2rem;
      text-align: center;
      color: hsl(var(--bc) / 0.7);
      transition: all 0.2s ease;
    }

    .file-drop-zone:hover {
      border-color: hsl(var(--a));
      background-color: hsl(var(--b2));
    }

    .file-drop-zone:focus-visible {
      outline: 2px solid hsl(var(--a));
      outline-offset: 2px;
    }

    /* Fullscreen Chat Styles */
    #chat-section.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1000;
      background-color: hsl(var(--b1));
      padding: 2rem;
      margin-top: 0 !important;
      display: flex;
      flex-direction: column;
      border-top: none !important;
    }

    #chat-section.fullscreen #chat-messages {
      flex: 1;
      height: auto !important;
    }

    #chat-section.fullscreen .chat-header-actions {
      margin-bottom: 2rem;
    }
  </style>
</head>

<body class="antialiased flex flex-col min-h-screen">
  <div class="flex-1 flex items-center justify-center p-4">
    <div class="card w-full max-w-2xl bg-base-100 shadow-2xl">
      <div class="p-8">
        <div class="flex flex-col items-center">
          <img src="/logo.svg" alt="Wormhole Logo" class="h-16 w-16 mb-4" />

          <h2 class="text-2xl font-semibold mb-2">Wormhole</h2>
          <p class="text-base opacity-60 mb-8">Secure and private file transfer</p>

          <div class="tabs tabs-boxed bg-base-200 mb-8" role="tablist" aria-label="Transfer mode" data-tab-group="wormhole">
            <button type="button" role="tab" class="tab tab-active" data-tab-button="send" aria-selected="true" aria-controls="send-tab" id="tab-send">Send</button>
            <button type="button" role="tab" class="tab" data-tab-button="receive" aria-selected="false" aria-controls="receive-tab" id="tab-receive">Receive</button>
            <button type="button" role="tab" class="tab" data-tab-button="chat-only" aria-selected="false" aria-controls="chat-only-tab" id="tab-chat-only">Chat</button>
          </div>

          <div id="send-tab" role="tabpanel" aria-labelledby="tab-send" class="w-full space-y-4" data-tab-panel="send">
            <div id="send-prompt" role="button" tabindex="0" aria-label="Click or press Enter to upload a file"
              class="file-drop-zone flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-base-200 transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-accent" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M12 15l-3-3m0 0l3-3m-3 3h12" />
              </svg>
              <span class="text-sm opacity-60 text-center">Drag a file or click to select</span>
            </div>

            <input type="file" id="fileInput" class="hidden" />

            <div id="file-info-section" class="w-full hidden">
              <div class="bg-base-200 rounded-xl p-4 mb-4">
                <h3 class="font-medium mb-2">Selected File:</h3>
                <div id="file-details" class="text-sm opacity-70"></div>
              </div>
              <button type="button" id="send-btn" class="btn btn-accent w-full" disabled>Start Transfer</button>
            </div>

            <div id="code-section" class="w-full hidden">
              <div class="bg-base-200 rounded-xl p-4 mb-2">
                <pre class="text-accent font-mono text-center tracking-wider"><code id="transfer-code"></code></pre>
              </div>
              <p class="text-xs opacity-70 text-center px-2">
                The code is the end-to-end encryption key. Share it only with the intended recipient.
              </p>
              <button type="button" class="btn btn-accent w-full" data-action="copy-code">Copy Code</button>
            </div>

            <div id="send-status" class="mt-4" aria-live="polite"></div>
            <div id="send-progress" class="w-full hidden">
              <progress class="progress progress-accent w-full" value="0" max="100"></progress>
            </div>
          </div>

          <div id="receive-tab" role="tabpanel" aria-labelledby="tab-receive" class="w-full hidden" data-tab-panel="receive">
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium mb-2" for="receive-code">Sync Code</label>
                <input type="text" id="receive-code" placeholder="e.g.: 7-guitar-horse" maxlength="50"
                  class="input input-bordered w-full" />
              </div>
              <button type="button" class="btn btn-accent w-full" id="receive-btn">Connect to Wormhole</button>
              <div id="receive-status" aria-live="polite"></div>
              <div id="receive-progress" class="w-full hidden">
                <progress class="progress progress-accent w-full" value="0" max="100"></progress>
              </div>
            </div>
          </div>

          <div id="chat-only-tab" role="tabpanel" aria-labelledby="tab-chat-only" class="w-full hidden" data-tab-panel="chat-only">
            <div class="space-y-6">
              <div class="bg-base-200 p-4 rounded-xl space-y-4">
                <div>
                  <label class="block text-sm font-medium mb-2" for="chat-nickname">Your Nickname (Optional)</label>
                  <input type="text" id="chat-nickname" placeholder="e.g.: Satoshi" maxlength="20"
                    class="input input-bordered w-full focus:input-accent" />
                </div>
                
                <div class="divider text-xs opacity-40">CHOOSE ACTION</div>

                <div class="flex flex-col gap-3">
                  <button type="button" class="btn btn-outline btn-accent w-full" id="create-chat-btn">
                    Create New Secure Chat
                  </button>
                  <div class="divider text-xs opacity-40">OR</div>
                  <div>
                    <label class="block text-sm font-medium mb-2" for="chat-only-code">Join with Code</label>
                    <div class="flex gap-2">
                      <input type="text" id="chat-only-code" placeholder="e.g.: 7-guitar-horse" maxlength="50"
                        class="input input-bordered flex-1 focus:input-accent" />
                      <button type="button" class="btn btn-accent" id="join-chat-btn">Join</button>
                    </div>
                  </div>
                </div>
              </div>
              <div id="chat-only-status" aria-live="polite"></div>
            </div>
          </div>

          <!-- Chat Section -->
          <div id="chat-section" class="w-full mt-8 hidden border-t border-base-300 pt-6">
            <div class="flex items-center justify-between mb-4 chat-header-actions">
              <h3 class="text-lg font-medium flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
                Secure Chat
              </h3>
              <div class="flex items-center gap-2">
                <button type="button" id="fullscreen-chat-btn" class="btn btn-ghost btn-xs btn-square" title="Toggle Fullscreen">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                  </svg>
                </button>
                <span class="badge badge-accent badge-outline text-xs">E2EE</span>
              </div>
            </div>
            
            <div id="chat-messages" class="h-64 overflow-y-auto bg-base-200 rounded-xl p-4 mb-4 space-y-3 flex flex-col scroll-smooth">
              <div class="text-center text-xs opacity-40 py-2">Messages are end-to-end encrypted</div>
            </div>
            
            <form id="chat-form" class="flex gap-2">
              <input type="text" id="chat-input" placeholder="Type a message..." class="input input-bordered flex-1 focus:input-accent" autocomplete="off" />
              <button type="submit" id="chat-send-btn" class="btn btn-accent btn-square">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="w-full py-5 px-1 mt-auto">
    <div class="w-full">
      <ul class="menu menu-horizontal w-full">
        <div class="flex justify-center items-center gap-2 text-sm w-full">
          <div class="text-center">
            <a href="https://github.com/scobru/shogun-wormhole" target="_blank" rel="noreferrer" class="link">
              Fork me
            </a>
          </div>
          <span>·</span>
          <div class="flex justify-center items-center gap-2">
            <p class="m-0 text-center">
              Built with 
              <svg xmlns="http://www.w3.org/2000/svg" class="inline-block h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
              </svg>
              by <a href="https://github.com/scobru" target="_blank" rel="noreferrer" class="link">scobru</a>
            </p>
          </div>
        </div>
      </ul>
    </div>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
