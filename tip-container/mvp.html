<!DOCTYPE html>
<html>
<head>
    <title>IRC Avanzato con GunDB</title>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .container { display: flex; gap: 20px; }
        .main-chat { flex-grow: 1; }
        .side-panel { width: 250px; border-left: 1px solid #ccc; padding-left: 20px; }
        #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: scroll; margin-bottom: 10px; background-color: #f9f9f9; }
        #users li { padding: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #users li .admin-badge { font-size: 0.7em; color: #fff; background-color: #007bff; padding: 2px 4px; border-radius: 3px; margin-left: 5px; }
        .controls, .message-bar, .auth-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        input { padding: 8px; flex-grow: 1; }
        button { padding: 8px; cursor: pointer; }
        .system-message { font-style: italic; color: #888; }
        .admin-actions button { font-size: 0.8em; padding: 2px 4px; }
        h1, h2, h3 { margin-top: 0; }
        #login-status { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>IRC Avanzato con GunDB & SEA</h1>

    <div id="login-status">
        Non sei loggato.
        <div class="auth-controls">
            <input type="text" id="auth-user" placeholder="username">
            <input type="password" id="auth-pass" placeholder="password">
            <button onclick="registerUser()">Registrati</button>
            <button onclick="loginUser()">Login</button>
            <button onclick="logoutUser()" disabled>Logout</button>
        </div>
    </div>
    <hr>
    
    <div class="container">
        <div class="main-chat">
            <h2>Canale: <span id="current-channel-name">Nessuno</span></h2>
            <div class="controls">
                <input type="text" id="channel" placeholder="#nomecanale">
                <button id="join-btn" onclick="joinChannel()" disabled>Entra</button>
                <button id="leave-btn" onclick="leaveChannel()" disabled>Esci</button>
            </div>
            <div id="chat"></div>
            <div class="message-bar">
                <input type="text" id="message" placeholder="Scrivi un messaggio..." disabled>
                <button id="send-btn" onclick="sendMessage()" disabled>Invia</button>
            </div>
        </div>

        <div class="side-panel">
            <h3>Utenti nel canale</h3>
            <ul id="users"></ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/radix.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/radisk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/lib/webrtc.js"></script>

    <script>
    // --- INIZIALIZZAZIONE E STATO ---
    const gun = Gun({
        peers: ['https://gun-manhattan.herokuapp.com/gun'],
        localStorage: true,
        radisk: true,
        file: false
    });
    const user = gun.user();

    // Utility function per firmare i dati
    async function signAndPut(node, data) {
        try {
            // Firma i dati con la chiave dell'utente
            const sig = await SEA.sign(data, user._.sea);
            return new Promise((resolve) => {
                node.put(sig, (ack) => {
                    if(ack.err) {
                        console.warn('Warning - Put error:', ack.err);
                    }
                    resolve(ack);
                });
            });
        } catch (error) {
            console.error('Error signing data:', error);
            return { err: 'Signing failed' };
        }
    }

    // Utility function per verificare e leggere i dati
    async function verifyAndGet(node) {
        return new Promise((resolve) => {
            node.once(async (data) => {
                if (!data) {
                    resolve(undefined);
                    return;
                }
                try {
                    // Verifica la firma se presente
                    if (data && data.slice && data.slice(0,4) === 'SEA{') {
                        const verified = await SEA.verify(data, user._.sea.pub);
                        resolve(verified);
                    } else {
                        resolve(data);
                    }
                } catch (error) {
                    console.error('Error verifying data:', error);
                    resolve(undefined);
                }
            });
            // Timeout dopo 2 secondi
            setTimeout(() => resolve(undefined), 2000);
        });
    }

    let currentState = {
        channel: null,
        channelRef: null,
        usersRef: null,
        adminsRef: null,
        bansRef: null,
        listeners: {}
    };

    // --- 1. FUNZIONI DI AUTENTICAZIONE (SEA) ---
    function registerUser() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        user.create(username, password, (ack) => {
            if (ack.err) {
                alert('Errore: ' + ack.err);
            } else {
                alert('Utente registrato! Ora puoi fare il login.');
            }
        });
    }

    function loginUser() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        user.auth(username, password, (ack) => {
            if (ack.err) {
                alert('Errore di login: ' + ack.err);
            } else {
                console.log('Login effettuato con successo!');
                try {
                    // Aggiorna l'interfaccia dopo il login
                    const loginStatus = document.getElementById('login-status');
                    const logoutBtn = document.querySelector('button[onclick="logoutUser()"]');
                    const joinBtn = document.getElementById('join-btn');
                    const authControls = document.querySelector('.auth-controls');
                    
                    if (loginStatus) loginStatus.innerHTML = `Loggato come: <strong>${user.is.alias}</strong>`;
                    if (logoutBtn) logoutBtn.disabled = false;
                    if (joinBtn) joinBtn.disabled = false;
                    if (authControls) authControls.style.display = 'none';
                } catch (error) {
                    console.error('Errore nell\'aggiornamento UI dopo il login:', error);
                }
            }
        });
    }

    function logoutUser() {
        user.leave();
        // Ricarica la pagina per un reset completo
        window.location.reload();
    }
    
    // Controlla se l'utente è già loggato al caricamento della pagina
    gun.on('auth', () => {
        if(user.is){
            try {
                const loginStatus = document.getElementById('login-status');
                const logoutBtn = document.querySelector('button[onclick="logoutUser()"]');
                const joinBtn = document.getElementById('join-btn');
                const authControls = document.querySelector('.auth-controls');
                
                if (loginStatus) loginStatus.innerHTML = `Loggato come: <strong>${user.is.alias}</strong>`;
                if (logoutBtn) logoutBtn.disabled = false;
                if (joinBtn) joinBtn.disabled = false;
                if (authControls) authControls.style.display = 'none';
            } catch (error) {
                console.error('Errore nell\'aggiornamento UI dopo auth:', error);
            }
        }
    });


    // --- 2. FUNZIONI IRC (Canali, Messaggi) ---
    async function joinChannel() {
        try {
            if (!user.is) {
                alert('Devi essere loggato per entrare in un canale.');
                return;
            }

            const channelName = document.getElementById('channel').value.trim();
            if (!channelName.startsWith('#')) {
                alert('Il nome del canale deve iniziare con #');
                return;
            }

            console.log('Tentativo di entrare nel canale:', channelName);

            const myAlias = user.is.alias;
            const myPub = user.is.pub;

            // Setup riferimenti GunDB per il canale
            const channelPath = `irc/channels/${channelName}`;
            const channelNode = gun.get(channelPath);
            currentState.channel = channelName;
            currentState.channelRef = channelNode.get('messages');
            currentState.usersRef = channelNode.get('users');
            currentState.adminsRef = channelNode.get('admins');
            currentState.bansRef = channelNode.get('bans');

            console.log('Riferimenti canale creati, verifico ban...');

            // Controlla se l'utente è bandito
            const isBanned = await verifyAndGet(currentState.bansRef.get(myPub));
            console.log('Stato ban:', isBanned);
            
            if(isBanned) {
                alert('Sei stato bandito da questo canale.');
                return;
            }

            console.log('Verifico admin esistenti...');

            // Controlla se il canale ha già degli admin
            let hasAdmins = false;
            await new Promise((resolve) => {
                currentState.adminsRef.map().once(async (data, key) => {
                    const verified = await verifyAndGet(currentState.adminsRef.get(key));
                    if(verified === true) {
                        console.log('Admin esistente trovato:', key);
                        hasAdmins = true;
                    }
                });
                setTimeout(resolve, 1000);
            });

            if (!hasAdmins) {
                console.log('Nessun admin trovato, imposto primo utente come admin');
                const ack = await signAndPut(currentState.adminsRef.get(myPub), true);
                console.log('Admin set ack:', ack);
                console.log(`Canale creato. L'utente ${myAlias} è il primo admin.`);
            }

            console.log('Aggiungo utente alla lista del canale');

            // Aggiungi utente alla lista del canale
            const userData = { pub: myPub, timestamp: Date.now() };
            const userAck = await signAndPut(currentState.usersRef.get(myAlias), userData);
            console.log('User add ack:', userAck);

            // Invia messaggio di join
            const joinMessage = { 
                user: 'SYSTEM', 
                text: `${myAlias} è entrato nel canale.`, 
                timestamp: Date.now() 
            };
            const msgAck = await signAndPut(currentState.channelRef, joinMessage);
            console.log('Join message ack:', msgAck);

            console.log('Attivo listener e aggiorno UI');
            listenToChannel();
            updateUIAfterJoin();
            
            console.log('Join completato con successo');
        } catch (error) {
            console.error('Errore durante il join del canale:', error);
            alert('Si è verificato un errore durante l\'accesso al canale. Controlla la console per i dettagli.');
        }
    }
    
    function leaveChannel() {
        const myAlias = user.is.alias;
        const leaveMessage = { user: 'SYSTEM', text: `${myAlias} ha lasciato il canale.` };
        currentState.channelRef.set(leaveMessage);

        currentState.usersRef.get(myAlias).put(null); // Rimuovi utente dalla lista

        Object.values(currentState.listeners).forEach(listener => listener.off());
        currentState = { channel: null, channelRef: null, usersRef: null, adminsRef: null, listeners: {} };
        updateUIAfterLeave();
    }

    async function sendMessage() {
        const messageText = document.getElementById('message').value.trim();
        if (messageText === '') return;
        
        const messageData = { 
            user: user.is.alias, 
            text: messageText, 
            timestamp: Date.now() 
        };
        
        await signAndPut(currentState.channelRef, messageData);
        document.getElementById('message').value = '';
    }

    // --- 3. FUNZIONI DI AMMINISTRAZIONE ---
    async function checkIfAdmin(userPub) {
        return new Promise(resolve => currentState.adminsRef.get(userPub).once(isAdmin => resolve(!!isAdmin)));
    }

    async function promoteUser(alias, pub) {
        if (!await checkIfAdmin(user.is.pub)) { alert('Non sei admin!'); return; }
        currentState.adminsRef.get(pub).put(true);
        currentState.channelRef.set({ user: 'SYSTEM', text: `${alias} è stato promosso ad admin.` });
    }

    async function kickUser(alias, pub) {
        if (!await checkIfAdmin(user.is.pub)) { alert('Non sei admin!'); return; }
        if (await checkIfAdmin(pub)) { alert('Non puoi kickare un altro admin.'); return; }
        currentState.usersRef.get(alias).put(null);
        currentState.channelRef.set({ user: 'SYSTEM', text: `${alias} è stato espulso dal canale.` });
    }

    async function banUser(alias, pub) {
        if (!await checkIfAdmin(user.is.pub)) { alert('Non sei admin!'); return; }
        if (await checkIfAdmin(pub)) { alert('Non puoi bannare un altro admin.'); return; }
        currentState.bansRef.get(pub).put(true); // Aggiungi la chiave pubblica alla lista dei ban
        currentState.usersRef.get(alias).put(null); // Eseguilo anche
        currentState.channelRef.set({ user: 'SYSTEM', text: `${alias} è stato bandito dal canale.` });
    }

    // --- 4. ASCOLTATORI E AGGIORNAMENTI UI ---
    function listenToChannel() {
        currentState.listeners.messages = currentState.channelRef.map().on(displayMessage);
        currentState.listeners.users = currentState.usersRef.map().on(() => updateUserList());

        // Se vengo kickato, il mio nome utente diventa `null` nella lista
        currentState.listeners.selfKick = currentState.usersRef.get(user.is.alias).on(u => {
            if (!u) {
                alert('Sei stato espulso dal canale.');
                leaveChannel();
            }
        });
    }

    async function displayMessage(message) {
        if (!message) return;
        
        try {
            // Se il messaggio è firmato, verificalo
            const verifiedMessage = message.slice && message.slice(0,4) === 'SEA{' 
                ? await SEA.verify(message, user._.sea.pub) 
                : message;

            if (!verifiedMessage) return;

            const el = document.createElement('div');
            if (verifiedMessage.user === 'SYSTEM') el.classList.add('system-message');
            el.textContent = verifiedMessage.user === 'SYSTEM' 
                ? verifiedMessage.text 
                : `${verifiedMessage.user}: ${verifiedMessage.text}`;
            
            document.getElementById('chat').appendChild(el);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
        } catch (error) {
            console.error('Error displaying message:', error);
        }
    }

    async function updateUserList() {
        try {
            const userListBox = document.getElementById('users');
            userListBox.innerHTML = '';
            const amIAdmin = await checkIfAdmin(user.is.pub);

            currentState.usersRef.map().once(async (userData, alias) => {
                if (userData) {
                    const li = document.createElement('li');
                    const userPub = userData.pub;
                    
                    // Fix: Get admin status before using it
                    const isUserAdmin = await checkIfAdmin(userPub);
                    
                    let userInfo = `<span>${alias}</span>`;
                    if(isUserAdmin) userInfo += `<span class="admin-badge">Admin</span>`;
                    
                    let adminActions = '';
                    if(amIAdmin && alias !== user.is.alias) {
                        adminActions = `<span class="admin-actions">
                            <button onclick="promoteUser('${alias}', '${userPub}')">P</button>
                            <button onclick="kickUser('${alias}', '${userPub}')">K</button>
                            <button onclick="banUser('${alias}', '${userPub}')">B</button>
                        </span>`;
                    }

                    li.innerHTML = `${userInfo} ${adminActions}`;
                    userListBox.appendChild(li);
                }
            });
        } catch (error) {
            console.error('Errore durante l\'aggiornamento della lista utenti:', error);
        }
    }
    
    function updateUIAfterJoin() {
        document.getElementById('channel').disabled = true;
        document.getElementById('join-btn').disabled = true;
        document.getElementById('leave-btn').disabled = false;
        document.getElementById('message').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('current-channel-name').textContent = currentState.channel;
    }

    function updateUIAfterLeave() {
        document.getElementById('chat').innerHTML = '';
        document.getElementById('users').innerHTML = '';
        document.getElementById('channel').disabled = false;
        document.getElementById('join-btn').disabled = false;
        document.getElementById('leave-btn').disabled = true;
        document.getElementById('message').disabled = true;
        document.getElementById('send-btn').disabled = true;
        document.getElementById('current-channel-name').textContent = 'Nessuno';
    }
    </script>
</body>
</html>
